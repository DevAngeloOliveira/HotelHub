name: Publish Web Image

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    paths:
      - "apps/web/**"
      - "docker/web/**"
      - "docker/base/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BASE_WEB_TAG: node22-v1

jobs:
  quality:
    name: Web quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace web

      - name: Typecheck
        run: npm run typecheck --workspace web

      - name: Build
        run: npm run build --workspace web

  publish:
    name: Publish Web
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/hotelhub-web
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          build-args: |
            BASE_WEB_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/hotelhub-base-web:${{ env.BASE_WEB_TAG }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
