name: CI Web

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "docker/web/**"
      - "docker/base/web/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/ci-web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "docker/web/**"
      - "docker/base/web/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/ci-web.yml"

jobs:
  validate-web:
    name: Validate Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace web

      - name: Typecheck
        run: npm run typecheck --workspace web

      - name: Build
        run: npm run build --workspace web

  build-web-image:
    name: Build Web image (local)
    runs-on: ubuntu-latest
    needs: validate-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build base Web image
        run: docker build -f docker/base/web/Dockerfile . -t hotelhub-base-web:ci

      - name: Build Web image
        run: |
          docker build \
            -f docker/web/Dockerfile \
            --build-arg BASE_WEB_IMAGE=hotelhub-base-web:ci \
            . \
            -t hotelhub-web:ci
