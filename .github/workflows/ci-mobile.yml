name: CI Mobile

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/mobile/**"
      - "docker/mobile/**"
      - "docker/base/mobile/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/ci-mobile.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "docker/mobile/**"
      - "docker/base/mobile/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/ci-mobile.yml"

jobs:
  validate-mobile:
    name: Validate Mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace mobile

      - name: Typecheck
        run: npm run typecheck --workspace mobile

  build-mobile-builder-image:
    name: Build Mobile builder image (local)
    runs-on: ubuntu-latest
    needs: validate-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build base Mobile image
        run: docker build -f docker/base/mobile/Dockerfile . -t hotelhub-base-mobile:ci

      - name: Build Mobile builder image
        run: |
          docker build \
            -f docker/mobile/Dockerfile \
            --build-arg BASE_MOBILE_IMAGE=hotelhub-base-mobile:ci \
            . \
            -t hotelhub-mobile-builder:ci

      - name: Run container smoke command
        run: docker run --rm hotelhub-mobile-builder:ci
