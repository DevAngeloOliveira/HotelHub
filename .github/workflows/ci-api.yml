name: CI API

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "docker/api/**"
      - "docker/base/api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "docker/api/**"
      - "docker/base/api/**"
      - ".github/workflows/ci-api.yml"

jobs:
  validate-api:
    name: Validate API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

  build-api-image:
    name: Build API image (local)
    runs-on: ubuntu-latest
    needs: validate-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build base API image
        run: docker build -f docker/base/api/Dockerfile . -t hotelhub-base-api:ci

      - name: Build API image
        run: |
          docker build \
            -f docker/api/Dockerfile \
            --build-arg BASE_API_IMAGE=hotelhub-base-api:ci \
            . \
            -t hotelhub-api:ci
