name: Publish Mobile Artifacts

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    paths:
      - "apps/mobile/**"
      - "docker/mobile/**"
      - "docker/base/mobile/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-mobile-artifacts.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BASE_MOBILE_TAG: node22-java17-v1

jobs:
  quality:
    name: Mobile quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace mobile

      - name: Typecheck
        run: npm run typecheck --workspace mobile

  export-mobile-bundle:
    name: Export mobile bundle artifact
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export Android bundle
        run: |
          cd apps/mobile
          npx expo export --platform android --output-dir ../../dist/mobile-export

      - name: Upload mobile export
        uses: actions/upload-artifact@v4
        with:
          name: mobile-export-${{ github.sha }}
          path: dist/mobile-export

  publish-mobile-builder-image:
    name: Publish mobile-builder image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/hotelhub-mobile-builder
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push mobile-builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/mobile/Dockerfile
          build-args: |
            BASE_MOBILE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/hotelhub-base-mobile:${{ env.BASE_MOBILE_TAG }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
