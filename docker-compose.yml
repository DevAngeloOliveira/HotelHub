services:
  base-api:
    image: hotelhub-base-api:local
    build:
      context: .
      dockerfile: docker/base/api/Dockerfile
    profiles:
      - base-images

  base-web:
    image: hotelhub-base-web:local
    build:
      context: .
      dockerfile: docker/base/web/Dockerfile
    profiles:
      - base-images

  base-mobile:
    image: hotelhub-base-mobile:local
    build:
      context: .
      dockerfile: docker/base/mobile/Dockerfile
    profiles:
      - base-images

  db:
    image: postgres:16-alpine
    container_name: hotelhub-db
    environment:
      POSTGRES_DB: hotelhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotelhub"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - hotelhub_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hotelhub-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - hotelhub_redis_data:/data
    restart: unless-stopped

  api:
    image: hotelhub-api:local
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        BASE_API_IMAGE: ${BASE_API_IMAGE:-hotelhub-base-api:local}
    container_name: hotelhub-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/hotelhub}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-2s}
      CACHE_TTL: ${CACHE_TTL:-300s}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      ADMIN_SEED_ENABLED: ${ADMIN_SEED_ENABLED:-false}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME:-System Admin}
      ADMIN_SEED_PHONE: ${ADMIN_SEED_PHONE}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    image: hotelhub-web:local
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        BASE_WEB_IMAGE: ${BASE_WEB_IMAGE:-hotelhub-base-web:local}
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    container_name: hotelhub-web
    depends_on:
      api:
        condition: service_started
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      API_INTERNAL_URL: http://api:8080/api/v1
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: hotelhub-nginx
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/v1/swagger-ui.html"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mobile-builder:
    image: hotelhub-mobile-builder:local
    build:
      context: .
      dockerfile: docker/mobile/Dockerfile
      args:
        BASE_MOBILE_IMAGE: ${BASE_MOBILE_IMAGE:-hotelhub-base-mobile:local}
    container_name: hotelhub-mobile-builder
    profiles:
      - mobile-builder

volumes:
  hotelhub_postgres_data:
  hotelhub_redis_data:
