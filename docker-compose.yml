services:
  base-api:
    image: hotelhub-base-api:local
    build:
      context: .
      dockerfile: docker/base/api/Dockerfile
    profiles:
      - base-images

  base-web:
    image: hotelhub-base-web:local
    build:
      context: .
      dockerfile: docker/base/web/Dockerfile
    profiles:
      - base-images

  base-mobile:
    image: hotelhub-base-mobile:local
    build:
      context: .
      dockerfile: docker/base/mobile/Dockerfile
    profiles:
      - base-images

  db:
    image: postgres:16-alpine
    container_name: hotelhub-db
    environment:
      POSTGRES_DB: hotelhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotelhub"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - hotelhub_postgres_data:/var/lib/postgresql/data

  api:
    image: hotelhub-api:local
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        BASE_API_IMAGE: ${BASE_API_IMAGE:-hotelhub-base-api:local}
    container_name: hotelhub-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/hotelhub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-key-with-at-least-32-characters
      JWT_EXPIRATION_MINUTES: 60
      ADMIN_SEED_ENABLED: false
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    image: hotelhub-web:local
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        BASE_WEB_IMAGE: ${BASE_WEB_IMAGE:-hotelhub-base-web:local}
    container_name: hotelhub-web
    depends_on:
      api:
        condition: service_started
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://api:8080/api/v1
    ports:
      - "3000:3000"
    restart: unless-stopped

  mobile-builder:
    image: hotelhub-mobile-builder:local
    build:
      context: .
      dockerfile: docker/mobile/Dockerfile
      args:
        BASE_MOBILE_IMAGE: ${BASE_MOBILE_IMAGE:-hotelhub-base-mobile:local}
    container_name: hotelhub-mobile-builder
    profiles:
      - mobile-builder

volumes:
  hotelhub_postgres_data:
