spring:
  cache:
    type: none
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-key-with-at-least-32-chars
    expiration-minutes: 60
  admin-seed:
    enabled: false
